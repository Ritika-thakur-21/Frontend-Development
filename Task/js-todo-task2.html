<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 50px;
  background-color: #f4f4f4;
}

h1 {
  color: #333;
}

input {
  padding: 8px;
  width: 200px;
  font-size: 16px;
}

button {
  padding: 8px 12px;
  margin-left: 5px;
  cursor: pointer;
  border: none;
  background-color: #4CAF50;
  color: white;
  border-radius: 4px;
}

button:hover {
  background-color: #45a049;
}

ul {
  list-style-type: none;
  padding: 0;
  margin-top: 20px;
}

li {
  background: white;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 5px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

li button {
  background-color: red;
}

li button:hover {
  background-color: darkred;
}
  </style>
</head>
<body>

  <h1>Todo App</h1>

  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>

  <script src="./js-todoscript.js">
    
  </script>

</body>
</html>
