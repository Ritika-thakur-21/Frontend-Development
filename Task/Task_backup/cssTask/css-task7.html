<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style7.css">
</head>
<body>
    <header>
        <h2>Weather Now</h2>
        <button class="units">Units</button>
    </header>
    <h1 class="title">How's the sky looking today?</h1>

    <div class="search-box">
        <input type="text" placeholder="Search for a place...">
        <button>Search</button>
    </div>
    <div class="main">
        <div class="left">
            <div class="weather-card">
                <div>
                    <h2>Berlin, Germany</h2>
                    <p>Tuesday, Aug 5, 2025</p>
                </div>
                <h1>20</h1>
            </div>
            <div class="stats">
                <div>Feels Like <br><b>18°C</b></div>
                <div>Humidity <br><b>45%</b></div>
                <div>Wind <br><b>14 km/h</b></div>
                <div>Precipitation <br><b>0 mm</b></div>
            </div>
            <div class="daily">
                <div>Tue<br>20°</div>
                <div>Wed<br>21°</div>
                <div>Thu<br>24°</div>
                <div>Fri<br>25°</div>
                <div>Sat<br>21°</div>
                <div>Sun<br>25°</div>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="right">
            <h3>Hourly forecast</h3>

            <div class="hour">3 PM - 20°</div>
            <div class="hour">4 PM - 20°</div>
            <div class="hour">5 PM - 20°</div>
            <div class="hour">6 PM - 19°</div>
            <div class="hour">7 PM - 18°</div>
            <div class="hour">8 PM - 18°</div>
        </div>
        </div>
    </div>
</body>
</html>
